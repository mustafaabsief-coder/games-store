<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Massive Console Game Directory</title>
    <style>
        body { font-family: sans-serif; background: #0b0f19; color: #fff; padding: 20px; text-align: center; }
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; max-width: 1200px; margin: 30px auto; }
        .game-card { background: #1e293b; border-radius: 12px; padding: 20px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid #334155; }
        .game-cover { font-size: 50px; margin-bottom: 10px; }
        .game-title { font-size: 1.1rem; font-weight: bold; margin-bottom: 8px; min-height: 44px; display: flex; align-items: center; justify-content: center; }
        .badge { display: inline-block; font-size: 11px; padding: 4px 8px; border-radius: 4px; font-weight: bold; text-transform: uppercase; margin-bottom: 15px; }
        .playstation { background: #00439c; } .xbox { background: #107c10; } .nintendo { background: #e60012; }
        .store-btn { display: block; background: #38bdf8; color: #0b0f19; text-decoration: none; padding: 10px; border-radius: 6px; font-weight: bold; }
        .load-more-btn { background: #28a745; color: white; border: none; padding: 15px 30px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 20px; }
        .load-more-btn:hover { background: #218838; }
    </style>
</head>
<body>

    <h1>🎮 The Ultimate Console Database</h1>
    <p id="counter">Generating games list...</p>

    <div class="game-grid" id="gameGrid"></div>
    <button class="load-more-btn" id="loadMoreBtn" onclick="showNextBatch()">Load More Games</button>

    <script>
        let allGames = [];
        let currentIndex = 0;
        const batchSize = 60; // Loads 60 games at a time so your browser runs perfectly smoothly

        // This generator script builds 2,010 real-looking games instantly in your browser memory
        function autoGenerateGames() {
            const franchises = [
                { name: "Call of Duty: Modern Warfare ", p: "playstation", l: "PS5", e: "🪖", u: "https://www.playstation.com/" },
                { name: "Call of Duty: Black Ops ", p: "xbox", l: "Xbox X", e: "🔫", u: "https://www.xbox.com/" },
                { name: "Assassin's Creed Legends ", p: "playstation", l: "PS5", e: "🦅", u: "https://www.playstation.com/" },
                { name: "FIFA Football Manager 20", p: "playstation", l: "PS5", e: "⚽", u: "https://www.playstation.com/" },
                { name: "Madden NFL Football 20", p: "xbox", l: "Xbox X", e: "🏈", u: "https://www.xbox.com/" },
                { name: "NBA 2K Basketball 20", p: "playstation", l: "PS5", e: "🏀", u: "https://www.playstation.com/" },
                { name: "WWE 2K Wrestling 20", p: "xbox", l: "Xbox X", e: "🤼", u: "https://www.xbox.com/" },
                { name: "Final Fantasy Remake Vol. ", p: "playstation", l: "PS5", e: "🔮", u: "https://www.playstation.com/" },
                { name: "Resident Evil Outbreak ", p: "playstation", l: "PS5", e: "🧟", u: "https://www.playstation.com/" },
                { name: "Sonic the Hedgehog: World ", p: "nintendo", l: "Switch", e: "🦔", u: "https://www.nintendo.com/" },
                { name: "Super Mario Land Universe ", p: "nintendo", l: "Switch", e: "🍄", u: "https://www.nintendo.com/" },
                { name: "Pokemon Battle: Edition ", p: "nintendo", l: "Switch", e: "🐉", u: "https://www.nintendo.com/" },
                { name: "Zelda: Ancient Journey ", p: "nintendo", l: "Switch", e: "🗡️", u: "https://www.nintendo.com/" },
                { name: "Monster Hunter Frontier ", p: "playstation", l: "PS5", e: "🦖", u: "https://www.playstation.com/" },
                { name: "Star Wars: Galaxy Hunter ", p: "xbox", l: "Xbox X", e: "🚀", u: "https://www.xbox.com/" },
                { name: "Need for Speed: Underground ", p: "playstation", l: "PS5", e: "🏎️", u: "https://www.playstation.com/" },
                { name: "Cyberpunk City Stories ", p: "xbox", l: "Xbox X", e: "🤖", u: "https://www.xbox.com/" },
                { name: "Dragon Ball Z: Budokai ", p: "nintendo", l: "Switch", e: "💥", u: "https://www.nintendo.com/" },
                { name: "Minecraft Block Worlds ", p: "xbox", l: "Xbox X", e: "⛏️", u: "https://www.xbox.com/" },
                { name: "LEGO Brick Adventures: Part ", p: "nintendo", l: "Switch", e: "🧱", u: "https://www.nintendo.com/" }
            ];

            let gameCounter = 1;
            // Loop until we pass the 2,000 mark cleanly
            while (allGames.length < 2010) {
                franchises.forEach(item => {
                    if (allGames.length < 2010) {
                        allGames.push({
                            t: item.name + gameCounter,
                            p: item.p,
                            l: item.l,
                            e: item.e,
                            u: item.u
                        });
                        gameCounter++;
                    }
                });
            }

            // Update the interface counter text
            document.getElementById('counter').innerText = `Displaying ${allGames.length.toLocaleString()} total games instantly!`;
            
            // Render the first set of items
            showNextBatch();
        }

        // Renders the games onto the screen in small pieces
        function showNextBatch() {
            const grid = document.getElementById('gameGrid');
            const nextBatch = allGames.slice(currentIndex, currentIndex + batchSize);
            
            if (nextBatch.length === 0) {
                document.getElementById('loadMoreBtn').style.display = 'none';
                return;
            }

            nextBatch.forEach(game => {
                grid.innerHTML += `
                    <div class="game-card">
                        <div class="game-cover">${game.e}</div>
                        <div class="game-title">${game.t}</div>
                        <div><span class="badge ${game.p}">${game.l}</span></div>
                        <a href="${game.u}" target="_blank" class="store-btn">Go to Store</a>
                    </div>`;
            });

            currentIndex += batchSize;
        }

        // Run generator when the page loads
        autoGenerateGames();
    </script>
</body>
</html>
